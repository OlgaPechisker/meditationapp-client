<section class="contact-cta">
  <div class="contact-cta__container">
    <h1 class="contact-cta__title">{{ 'contact.title' | transloco }}</h1>
    <p class="contact-cta__lead">{{ 'contact.lead' | transloco }}</p>

    <app-cta-form idPrefix="contact" />

    <div class="contact-cta__details">
      <a [href]="'mailto:' + email()" class="contact-cta__detail-link">{{ email() }}</a>
      <a [href]="'tel:' + phone()" class="contact-cta__detail-link">{{ phone() }}</a>
    </div>
  </div>
</section>
