<div class="treatments-page">

  <header class="treatments-hero">
    <div class="treatments-hero__inner">
      <h1 class="treatments-hero__title">{{ 'treatments.title' | transloco }}</h1>
      <p class="treatments-hero__subtitle">מרחב ריפוי, מדיטציה ושלווה פנימית</p>
      <span class="treatments-hero__ornament" aria-hidden="true"></span>
    </div>
  </header>

  @for (treatment of treatments(); track treatment.id; let idx = $index) {
    <section
      class="treatment-section"
      [class.treatment-section--reverse]="idx % 2 === 1"
      [class.treatment-section--alt-bg]="idx % 2 === 1"
      data-testid="treatment-card"
      [attr.data-slug]="treatment.slug"
    >
      <div class="treatment-section__container">

        <div class="treatment-section__visual">
          <img
            class="treatment-section__illustration"
            [src]="idx % 2 === 0 ? '/assets/images/buddha-meditation.svg' : '/assets/images/floral-branch.svg'"
            [alt]="treatment.title"
            aria-hidden="true"
          />
        </div>

        <app-glass-panel class="treatment-section__content">
          <h2 class="treatment-section__title" data-testid="treatment-card-title">{{ treatment.title }}</h2>
          <span class="treatment-section__divider" aria-hidden="true"></span>
          <div class="treatment-section__description rich-content" [innerHTML]="treatment.description"></div>
          <a
            [href]="getWhatsappLink(treatment.title)"
            target="_blank"
            rel="noopener"
            class="treatment-section__cta"
          >
            {{ 'treatments.book_via_whatsapp' | transloco }}
          </a>
        </app-glass-panel>

      </div>
    </section>
  }

  @if (!treatments().length && loaded()) {
    <p class="treatments-page__empty" data-testid="no-treatments-msg">אין טיפולים זמינים כרגע</p>
  }

</div>
