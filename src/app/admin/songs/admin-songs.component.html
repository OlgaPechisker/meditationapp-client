<div class="admin-section">
  <div class="section-header">
    <h2>ניהול שירים</h2>
    <button class="btn-primary" (click)="openCreate()" data-testid="add-song-btn">+ הוסף שיר</button>
  </div>

  @if (error()) {
    <div class="alert-error" data-testid="form-error">{{ error() }}</div>
  }

  @if (loading()) {
    <p class="loading">טוען...</p>
  } @else {
    @if (showForm()) {
      <div class="form-card" data-testid="song-form">
        <h3>{{ editing() ? 'עריכת שיר' : 'שיר חדש' }}</h3>
        <form [formGroup]="form" (ngSubmit)="save()">
          <div class="form-group">
            <label>כותרת</label>
            <input formControlName="title" data-testid="field-title" />
          </div>
          <div class="form-group">
            <label>תוכן (מילים)</label>
            <textarea formControlName="lyrics" rows="12" data-testid="field-lyrics"></textarea>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn-primary" data-testid="form-save">שמור</button>
            <button type="button" class="btn-secondary" (click)="cancel()" data-testid="form-cancel">ביטול</button>
          </div>
        </form>
      </div>
    }

    <table class="data-table" data-testid="songs-table">
      <thead>
        <tr>
          <th>כותרת</th>
          <th>פעולות</th>
        </tr>
      </thead>
      <tbody>
        @for (item of songs(); track item.id) {
          <tr data-testid="song-row" [attr.data-id]="item.id">
            <td data-testid="song-title">{{ item.title }}</td>
            <td class="actions">
              <button class="btn-sm btn-edit" (click)="openEdit(item)" data-testid="song-edit-btn">ערוך</button>
              <button class="btn-sm btn-delete" (click)="deleteItem(item)" data-testid="song-delete-btn">מחק</button>
            </td>
          </tr>
        }
      </tbody>
    </table>
  }
</div>
